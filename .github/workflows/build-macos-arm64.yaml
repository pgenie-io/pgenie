name: Build (macOS-arm64)

on:
  workflow_call:
    inputs:
      version:
        description: >
          Release version in SemVer (e.g. 1.2.3). When provided the version in
          cabal-file is updated to 0.<version> before building to follow PVP
          convention.
        type: string
        required: false
        default: ""
      ref:
        description: Commit SHA or ref to checkout for the build.
        type: string
        required: false
        default: ""

permissions:
  contents: read

env:
  artifact-name: pgn-macos-arm64

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Install libpq
        run: brew install libpq

      # libpq from Homebrew is keg-only and not in the default search paths,
      # so we tell cabal and postgresql-libpq where to find the headers and
      # library.  We also embed the Homebrew rpath into the pgenie executable
      # so that the distributed binary finds libpq without extra environment
      # variables – Homebrew distributions declare libpq as a dependency and
      # install it at this standard location.
      - name: Configure cabal for Homebrew libpq
        shell: bash
        run: |
          # libpq is keg-only; make pg_config and pkg-config metadata visible
          # to the postgresql-libpq build (it uses autoconf to find PostgreSQL).
          echo "/opt/homebrew/opt/libpq/bin" >> $GITHUB_PATH
          echo "PKG_CONFIG_PATH=/opt/homebrew/opt/libpq/lib/pkgconfig" >> $GITHUB_ENV

          cat >> cabal.project.local << 'EOF'
          package postgresql-libpq
            extra-include-dirs: /opt/homebrew/opt/libpq/include
            extra-lib-dirs: /opt/homebrew/opt/libpq/lib
          package pgenie
            extra-lib-dirs: /opt/homebrew/opt/libpq/lib
            ghc-options: -optl-Wl,-rpath,/opt/homebrew/opt/libpq/lib
          EOF

      - name: Build and test
        id: build
        uses: ./.github/actions/build
        with:
          version: ${{ inputs.version }}
          test-integration: false

      - name: Package
        shell: bash
        run: |
          dir="$(dirname "${{ steps.build.outputs.binary-path }}")"
          file="$(basename "${{ steps.build.outputs.binary-path }}")"
          tar -czf "${{ env.artifact-name }}.tar.gz" -C "$dir" "$file"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.artifact-name }}
          path: ${{ env.artifact-name }}.tar.gz

  e2e-sanity-check:
    needs: build
    runs-on: macos-14

    steps:
      - name: Install libpq
        run: brew install libpq

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.artifact-name }}
          path: artifact

      - name: Extract binary
        shell: bash
        run: |
          tar -xzf "artifact/${{ env.artifact-name }}.tar.gz" -C artifact
          chmod +x artifact/pgn

      - name: Verify binary version
        run: artifact/pgn --version

  e2e-running-server-mode:
    needs: build
    runs-on: macos-14

    env:
      DATABASE_URL: "host=localhost port=5432 user=postgres"

    steps:
      - uses: actions/checkout@v6

      - name: Install libpq
        run: brew install libpq

      - name: Install and start PostgreSQL
        run: |
          brew install postgresql@18
          PG_BIN="/opt/homebrew/opt/postgresql@18/bin"
          "$PG_BIN/initdb" -D ~/pgdata --auth=trust --username=postgres
          "$PG_BIN/pg_ctl" start -D ~/pgdata -l ~/pgdata/postgresql.log
          until "$PG_BIN/pg_isready" -h localhost -U postgres; do sleep 1; done
          echo "$PG_BIN" >> $GITHUB_PATH

      - uses: ./.github/actions/e2e-live-postgres
        with:
          artifact-name: ${{ env.artifact-name }}
          database-url: ${{ env.DATABASE_URL }}
