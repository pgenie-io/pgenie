name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# Cancel superseded runs for the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Format check ────────────────────────────────────────────────────────────
  # Run ormolu and cabal-gild; fail if either would change any files.
  # Auto-committing is intentionally omitted so developers must fix formatting
  # locally before merging.
  format:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Format Cabal
        uses: nikita-volkov/cabal-gild.github-action@v3

      - name: Format Haskell
        uses: nikita-volkov/ormolu.github-action@v3
        with:
          dirs: src

      - name: Fail if formatting is incorrect
        run: |
          git diff --exit-code || {
            echo "::error::Formatting is incorrect. Run 'ormolu' and 'cabal-gild' locally, then commit the fixes."
            exit 1
          }

  # ── Platform builds (run in parallel with the format check) ─────────────────
  build-linux:
    name: Build and test on Linux-x86_64
    uses: ./.github/workflows/build-and-test.yaml
    secrets: inherit
    with:
      os: ubuntu-latest
      artifact-name: pgn-linux-x86_64
      test: true

  build-macos-x86_64:
    name: Build and test on macOS-x86_64
    uses: ./.github/workflows/build-and-test.yaml
    secrets: inherit
    with:
      os: macos-26-intel
      artifact-name: pgn-macos-x86_64
      test: true

  build-windows:
    name: Build and test on Windows-x86_64
    uses: ./.github/workflows/build-and-test.yaml
    secrets: inherit
    with:
      os: windows-latest
      artifact-name: pgn-windows-x86_64.exe
      test: true

  # ── Stack build (ensures stack.yaml stays up to date) ───────────────────────
  build-stack:
    name: Build and test via Stack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: haskell-actions/setup@v2
        with:
          enable-stack: true
          stack-no-global: true

      - name: Cache Stack dependencies
        uses: actions/cache@v4
        with:
          path: ~/.stack
          key: ${{ runner.os }}-stack-${{ hashFiles('stack.yaml') }}
          restore-keys: |
            ${{ runner.os }}-stack-

      - name: Run tests via Stack
        run: stack test
