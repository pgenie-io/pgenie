name: E2E Tests (reusable)

# Reusable test-only workflow.  Callers are responsible for building the
# binary and uploading it as a workflow artifact before calling this workflow.
on:
  workflow_call:
    inputs:
      artifact-name:
        description: Name of the workflow artifact containing the pgn binary tarball
        type: string
        required: true
      runner:
        description: Runner label to use for the sanity-check and docker-mode jobs
        type: string
        required: true
      setup-docker:
        description: >
          Run docker/setup-docker-action before the docker-mode tests.
          Required on macOS runners where Docker is not pre-installed.
        type: boolean
        required: false
        default: false
      run-docker-mode:
        description: >
          Run the docker-mode job (tests all three commands using pGenie's
          built-in Docker container).  Set to false on runners without Docker.
        type: boolean
        required: false
        default: true
      run-server-mode:
        description: >
          Run the running-server-mode job (tests all three commands with
          --database-url pointing at a postgres:18 service container).
          Only works for Linux binaries because the job always runs on
          ubuntu-latest.
        type: boolean
        required: false
        default: true

permissions:
  contents: read

jobs:
  # ── Sanity check ─────────────────────────────────────────────────────────
  # Always runs on the target platform to verify the binary is executable
  # and correctly reports its version.
  sanity-check:
    runs-on: ${{ inputs.runner }}

    steps:
      - name: Install libpq (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libpq5

      - name: Install libpq (macOS)
        if: runner.os == 'macOS'
        run: brew install libpq

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact-name }}
          path: artifact

      - name: Extract binary
        shell: bash
        run: |
          tar -xzf "artifact/${{ inputs.artifact-name }}.tar.gz" -C artifact
          chmod +x artifact/pgn

      - name: Verify binary version
        run: artifact/pgn --version

  # ── Docker mode ───────────────────────────────────────────────────────────
  # Runs analyse, generate, and manage-indexes against a temporary PostgreSQL
  # container that pGenie spins up automatically (no --database-url needed).
  docker-mode:
    if: ${{ inputs.run-docker-mode }}
    runs-on: ${{ inputs.runner }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker
        if: ${{ inputs.setup-docker }}
        uses: docker/setup-docker-action@v5

      - name: Install libpq (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libpq5

      - name: Install libpq (macOS)
        if: runner.os == 'macOS'
        run: brew install libpq

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact-name }}
          path: artifact

      - name: Extract binary
        shell: bash
        run: |
          tar -xzf "artifact/${{ inputs.artifact-name }}.tar.gz" -C artifact
          chmod +x artifact/pgn

      - name: Set up test project
        run: cp -r .github/e2e e2e-project

      - name: analyse – docker mode
        working-directory: e2e-project
        run: $GITHUB_WORKSPACE/artifact/pgn analyse

      - name: generate – docker mode
        working-directory: e2e-project
        run: $GITHUB_WORKSPACE/artifact/pgn generate

      - name: manage-indexes – docker mode (output only)
        working-directory: e2e-project
        run: $GITHUB_WORKSPACE/artifact/pgn manage-indexes

      - name: manage-indexes – docker mode (add migration)
        working-directory: e2e-project
        run: |
          $GITHUB_WORKSPACE/artifact/pgn manage-indexes --add-migration
          # Verify the migration file was created
          ls migrations/ | grep -E '^[0-9]+\.sql$'

  # ── Running-server mode ───────────────────────────────────────────────────
  # Runs the same commands with --database-url against a real PostgreSQL 18
  # service container.  Always runs on ubuntu-latest because GitHub Actions
  # service containers require a Linux runner with Docker.  Only enable this
  # for builds that produce a Linux binary.
  running-server-mode:
    if: ${{ inputs.run-server-mode }}
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: "host=localhost port=5432 user=postgres password=postgres"

    steps:
      - uses: actions/checkout@v6

      - name: Install libpq
        run: sudo apt-get update && sudo apt-get install -y libpq5

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact-name }}
          path: artifact

      - name: Extract binary
        shell: bash
        run: |
          tar -xzf "artifact/${{ inputs.artifact-name }}.tar.gz" -C artifact
          chmod +x artifact/pgn

      - name: Set up test project
        run: cp -r .github/e2e e2e-project

      - name: analyse – running-server mode
        working-directory: e2e-project
        run: $GITHUB_WORKSPACE/artifact/pgn --database-url "$DATABASE_URL" analyse

      - name: generate – running-server mode
        working-directory: e2e-project
        run: $GITHUB_WORKSPACE/artifact/pgn --database-url "$DATABASE_URL" generate

      - name: manage-indexes – running-server mode (output only)
        working-directory: e2e-project
        run: $GITHUB_WORKSPACE/artifact/pgn --database-url "$DATABASE_URL" manage-indexes

      - name: manage-indexes – running-server mode (add migration)
        working-directory: e2e-project
        run: |
          $GITHUB_WORKSPACE/artifact/pgn --database-url "$DATABASE_URL" manage-indexes --add-migration
          # Verify the migration file was created
          ls migrations/ | grep -E '^[0-9]+\.sql$'
