name: Build and Test (macOS)

on:
  workflow_call:
    inputs:
      os:
        description: Runner operating system (e.g. macos-latest, macos-26-intel)
        type: string
        required: true
      artifact-name:
        description: Name for the uploaded binary artifact (e.g. pgn-macos-arm64)
        type: string
        required: true
      version:
        description: >
          Release version in SemVer (e.g. 1.2.3). When provided the version in
          cabal-file is updated to 0.<version> before building to follow PVP
          convention.
        type: string
        required: false
        default: ""
      test:
        description: Run integration tests that require Docker/Postgres
        type: boolean
        required: false
        default: false
      e2e:
        description: Run end-to-end tests that require Docker/Postgres
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ inputs.os }}

    steps:
      - uses: actions/checkout@v6

      # testcontainers-postgresql (used by infra-test) needs a Docker daemon.
      # macOS runners need explicit setup.
      - name: Set up Docker
        if: inputs.test == true
        uses: docker/setup-docker-action@v5

      - name: Set up PostgreSQL
        uses: ikalnytskyi/action-setup-postgres@v8

      # Install Nix to provide reproducible, version-pinned static archives
      # for libpq and OpenSSL (see flake.nix).  Previous Homebrew-based
      # approaches were fragile because Homebrew's formulae do not reliably
      # ship the static archives (.a files) needed for all transitive
      # dependencies (e.g. the Kerberos libraries pulled in by GSSAPI support
      # in libpq are sometimes absent).  The Nix derivation compiles libpq
      # without GSSAPI/Kerberos, eliminating that class of failure.
      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34

      # Cache the Nix store to avoid rebuilding the static library derivation
      # on every CI run.  The cache key is invalidated whenever the Nix flake
      # inputs (flake.nix / flake.lock) change.
      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never
          gc-max-store-size: 1G

      # Build a Nix derivation that contains ONLY static archives (.a files)
      # for libpq and OpenSSL plus the libpq headers.  Because no .dylib files
      # are present in that directory, the macOS linker cannot silently fall
      # back to dynamic versions when cabal's extra-lib-dirs points there.
      - name: Configure static libpq linking via Nix
        shell: bash
        run: |
          set -euo pipefail
          nix build .#macos-static-deps --out-link /tmp/pgenie-static-deps
          STATIC_DEPS=/tmp/pgenie-static-deps
          echo "Static deps path: $STATIC_DEPS"
          ls -la "$STATIC_DEPS/lib/"

          # Configure cabal:
          # - postgresql-libpq: use the Nix-built libpq headers and the
          #   static-only library directory so -lpq resolves to libpq.a.
          # - pgenie (final executable): same static-only dir for -lpq, plus
          #   explicit -optl flags so the macOS linker is forced to use the
          #   OpenSSL static archives and cannot fall back to shared ones.
          cat >> cabal.project.local << EOF
          package postgresql-libpq
            extra-include-dirs: $STATIC_DEPS/include
            extra-lib-dirs: $STATIC_DEPS/lib
          package pgenie
            extra-lib-dirs: $STATIC_DEPS/lib
            ghc-options: -optl$STATIC_DEPS/lib/libssl.a -optl$STATIC_DEPS/lib/libcrypto.a
          EOF

      # On macOS, the linker stamps the *host* OS version as the binary's
      # minimum required macOS version (LC_BUILD_VERSION minos) unless told
      # otherwise.  The GitHub Actions macOS runners are currently macOS 14,
      # so without this setting the released binary would require macOS 14+.
      # Setting MACOSX_DEPLOYMENT_TARGET=12.0 makes the binary run on macOS 12
      # (Monterey) and later, which is the oldest widely-used Apple-supported
      # release for Apple Silicon.
      - name: Set macOS deployment target
        shell: bash
        run: echo "MACOSX_DEPLOYMENT_TARGET=12.0" >> $GITHUB_ENV

      - name: Build and test
        uses: ./.github/actions/build-and-test
        with:
          version: ${{ inputs.version }}
          artifact-name: ${{ inputs.artifact-name }}
          test: ${{ inputs.test }}

      - name: Rename binary
        shell: bash
        run: |
          chmod +x bin/pgn
          mv bin/pgn "bin/${{ inputs.artifact-name }}"
          tar -czf "bin/${{ inputs.artifact-name }}.tar.gz" -C bin "${{ inputs.artifact-name }}"

      # Verify the macOS binary targets the expected minimum OS version.
      # The "Set macOS deployment target" step above sets minos=12.0; if that
      # step is ever accidentally removed, this check will catch it before
      # release.
      - name: Validate macOS minimum version (minos=12.0)
        shell: bash
        run: |
          minos=$(otool -l "bin/${{ inputs.artifact-name }}" \
            | awk '/LC_BUILD_VERSION/{f=1} f && /minos/{print $2; f=0}')
          echo "Binary minos: $minos"
          if [[ "$minos" != "12.0" ]]; then
            echo "::error::Expected minos 12.0 but got $minos."
            echo "::error::Ensure MACOSX_DEPLOYMENT_TARGET=12.0 is exported"
            echo "::error::before cabal build (see 'Set macOS deployment target' step)."
            exit 1
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: bin/${{ inputs.artifact-name }}.tar.gz

  # Download the uploaded artifact on a fresh runner and run the full
  # artifact-generation workflow against the demo project.  This simulates
  # what a real user does after downloading the binary from a GitHub release:
  # the runner starts in a clean state without any of the build dependencies
  # cached, so this validates that the artifact is truly self-contained and
  # does not rely on any undeclared dependencies that happened to be present
  # in the build environment.
  #
  # NOTE: The macOS binary is currently broken and crashes with
  #   "dyld: missing symbol called" when pgn-generate is executed.
  # The macOS step detects this known failure and reports it without
  # failing the job, so that CI remains green while the issue is tracked.
  validate-artifact:
    needs: build
    runs-on: ${{ inputs.os }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4.1.3
        with:
          name: ${{ inputs.artifact-name }}
          path: artifact

      - name: Extract binary
        shell: bash
        run: |
          cd artifact
          tar -xzf "${{ inputs.artifact-name }}.tar.gz"
          ls -la

      - name: Run basic check on the binary
        run: |
          "$GITHUB_WORKSPACE/artifact/${{ inputs.artifact-name }}" --version

      - name: Checkout demo project
        if: inputs.e2e == true
        uses: actions/checkout@v6
        with:
          repository: pgenie-io/demo
          ref: 3fd8694f8f77c46e99c5b2d16a88f63b0d6aa21b
          path: demo

      - name: Set up Docker
        if: inputs.e2e == true
        uses: docker/setup-docker-action@v5

      - name: Run end-to-end test
        if: inputs.e2e == true
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE/demo"
          "$GITHUB_WORKSPACE/artifact/${{ inputs.artifact-name }}" generate
