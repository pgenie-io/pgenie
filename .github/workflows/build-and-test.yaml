name: Build and Test

on:
  workflow_call:
    inputs:
      os:
        description: Runner operating system (e.g. ubuntu-latest, macos-latest, windows-latest)
        type: string
        required: true
      artifact-name:
        description: Name for the uploaded binary artifact (e.g. pgn-linux-x86_64)
        type: string
        required: true
      version:
        description: >
          Release version in SemVer (e.g. 1.2.3). When provided the version in cabal-file is
          updated to 0.<version> before building to follow PVP convention.
        type: string
        required: false
        default: ""
      test:
        description: Run integration tests that require Docker/Postgres
        type: boolean
        required: false
        default: false
      e2e:
        description: Run end-to-end tests that require Docker/Postgres
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ inputs.os }}

    steps:
      - uses: actions/checkout@v6

      - name: GitHub Actions runner OS system information
        uses: kenchan0130/actions-system-info@v1.4.0
        id: system-info

      - name: Update version in cabal file
        if: inputs.version != ''
        shell: bash
        run: perl -i -pe 's/^version:\s*\K\S+/0.${{ inputs.version }}/' pgenie.cabal

      # testcontainers-postgresql (used by infra-test) needs a Docker daemon.
      # Linux runners already include one; macOS and Windows need explicit setup.
      - name: Set up Docker
        if: inputs.test == true && runner.os == 'macOS'
        uses: docker/setup-docker-action@v5

      # Set up a system PostgreSQL instance only when running integration
      # tests that connect to it directly (inputs.test == true).
      #
      # IMPORTANT: do NOT run this step for macOS builds that only use
      # the Nix-provided static libpq.  `ikalnytskyi/action-setup-postgres`
      # runs `brew link postgresql@18`, which creates 800+ symlinks in
      # /usr/local/lib/ (the Homebrew prefix) including
      # /usr/local/lib/libpq.dylib.  On macOS Intel, /usr/local/lib/ is in
      # the linker's default search path and is searched *before* any
      # explicit -L paths added by cabal's extra-lib-dirs.  This causes
      # `ld -lpq` to resolve to the Homebrew dynamic libpq.dylib instead of
      # our Nix-built static libpq.a, so the final binary is dynamically
      # linked against Homebrew's libpq.  That libpq brings in Homebrew's
      # own dynamic OpenSSL (libssl.3.dylib, libcrypto.3.dylib) at runtime,
      # while our binary *also* has static OpenSSL embedded via the -optl
      # flags below — two OpenSSL instances in one process → memory
      # corruption → SIGSEGV at the first SQL connection.
      - name: Set up PostgreSQL
        if: runner.os == 'macOS' && inputs.test == true
        uses: ikalnytskyi/action-setup-postgres@v8

      # Install Nix to provide reproducible, version-pinned static archives
      # for libpq and OpenSSL (see flake.nix).  Previous Homebrew-based
      # approaches were fragile because Homebrew's formulae do not reliably
      # ship the static archives (.a files) needed for all transitive
      # dependencies (e.g. the Kerberos libraries pulled in by GSSAPI support
      # in libpq are sometimes absent).  The Nix derivation compiles libpq
      # without GSSAPI/Kerberos, eliminating that class of failure.
      - name: Install Nix
        if: runner.os == 'macOS'
        uses: nixbuild/nix-quick-install-action@v34

      # Cache the Nix store to avoid rebuilding the static library derivation
      # on every CI run.  The cache key is invalidated whenever the Nix
      # flake inputs (flake.nix / flake.lock) change.
      - name: Cache Nix store
        if: runner.os == 'macOS'
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never
          gc-max-store-size: 1G

      # Build a Nix derivation that contains ONLY static archives (.a files)
      # for libpq and OpenSSL plus the libpq headers.  Because no .dylib files
      # are present in that directory, the macOS linker cannot silently fall
      # back to dynamic versions when cabal's extra-lib-dirs points there.
      - name: Configure static libpq linking via Nix (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          nix build .#macos-static-deps --out-link /tmp/pgenie-static-deps
          STATIC_DEPS=/tmp/pgenie-static-deps
          echo "Static deps path: $STATIC_DEPS"
          ls -la "$STATIC_DEPS/lib/"

          # Configure cabal:
          # - postgresql-libpq: use the Nix-built libpq headers and the
          #   static-only library directory so -lpq resolves to libpq.a.
          #   Now that system PostgreSQL is not installed (no brew link),
          #   there is no competing /usr/local/lib/libpq.dylib and -lpq
          #   correctly finds our static libpq.a.
          # - pgenie (final executable): pass libssl.a and libcrypto.a via
          #   -Wl,-force_load so the macOS linker includes ALL archive
          #   members, not just those reachable from explicit symbol
          #   references.  This is required for OpenSSL 3.x: the provider
          #   registration constructors live in archive members with no
          #   external callers; without -force_load they are silently omitted,
          #   leaving OpenSSL's provider table empty → SIGSEGV on first call.
          cat >> cabal.project.local << EOF
          package postgresql-libpq
            extra-include-dirs: $STATIC_DEPS/include
            extra-lib-dirs: $STATIC_DEPS/lib
          package pgenie
            extra-lib-dirs: $STATIC_DEPS/lib
            ghc-options:
              -optl-Wl,-force_load,$STATIC_DEPS/lib/libssl.a
              -optl-Wl,-force_load,$STATIC_DEPS/lib/libcrypto.a
          EOF

      - name: Install Windows deps
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: |
            pkg-config
            zlib

      - name: Set up GHC
        id: setup
        uses: haskell-actions/setup@v2
        with:
          ghc-version: 9.12.2
          cabal-version: latest

      # On Windows, haskell-actions/setup outputs C:\sr as the cabal-store
      # path, which is a junction (reparse-point) to the real store directory.
      # actions/cache does not traverse junctions, so it only captures the
      # tiny junction metadata instead of the actual package contents.
      # We resolve the junction to the real target path here so that the
      # cache steps below operate on the actual directory.
      - name: Resolve cabal store path
        id: cabal-store-path
        shell: bash
        run: |
          dir="${{ steps.setup.outputs.cabal-store }}"
          if [[ "${{ runner.os }}" == "Windows" ]]
          then
            real=$(powershell.exe -NoProfile -Command "(Get-Item '$dir').Target" 2>/dev/null || true)
            if [[ -n "$real" ]]
            then
              dir="$real"
            fi
          fi
          echo "path=$dir" >> $GITHUB_OUTPUT

      # On macOS, the linker stamps the *host* OS version as the binary's
      # minimum required macOS version (LC_BUILD_VERSION minos) unless told
      # otherwise.  The GitHub Actions macOS runners are currently macOS 14,
      # so without this setting the released binary would require macOS 14+.
      # Setting MACOSX_DEPLOYMENT_TARGET=12.0 makes the binary run on
      # macOS 12 (Monterey) and later, which is the oldest widely-used
      # Apple-supported release for Apple Silicon.
      # Without this, users on macOS 12 or 13 see:
      #   dyld[pid]: missing symbol called   (followed by Abort trap: 6)
      # because dyld4 loads the binary but treats unresolvable macOS-14-only
      # symbols as NULL weak stubs that crash on first call.
      #
      # IMPORTANT: this step MUST come before "Restore dependency cache" so
      # that MACOSX_DEPLOYMENT_TARGET is included in the cache key.  GHC
      # compiles Haskell packages into .dylib files whose LC_BUILD_VERSION
      # minos is determined by the deployment target at compile time.  If the
      # cached packages were built without this setting (minos = host macOS
      # version, e.g. 26.0) but the final binary is linked with minos=12.0,
      # macOS's dynamic linker initialises the two inconsistently, causing a
      # segfault when libpq is first used.  Including the deployment target in
      # the cache key ensures the cache is invalidated whenever the target
      # changes, so all packages and the binary share the same minos value.
      - name: Set macOS deployment target
        if: runner.os == 'macOS'
        run: echo "MACOSX_DEPLOYMENT_TARGET=12.0" >> $GITHUB_ENV

      # Restore the package-store cache so that dependency compilation is
      # skipped when unchanged.  The cache is split from the full build so
      # that it is always saved even when later steps (tests) fail.
      #
      # The cache key includes MACOSX_DEPLOYMENT_TARGET (empty on non-macOS)
      # so that a change to the deployment target forces a cache miss and
      # recompilation, keeping all .dylib minos values consistent with the
      # final binary.
      - name: Restore dependency cache
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ steps.cabal-store-path.outputs.path }}
          key: ${{ runner.os }}-${{ steps.system-info.outputs.release }}-ghc-${{ steps.setup.outputs.ghc-version }}-${{ env.MACOSX_DEPLOYMENT_TARGET }}-${{ hashFiles('**/*.cabal', 'cabal.project*') }}
          restore-keys: |
            ${{ runner.os }}-${{ steps.system-info.outputs.release }}-ghc-${{ steps.setup.outputs.ghc-version }}-${{ env.MACOSX_DEPLOYMENT_TARGET }}-

      - name: Update Cabal package list
        run: cabal update

      - name: Build dependencies
        run: cabal build --only-dependencies --enable-tests

      # Save the cache immediately after dependencies are built so that the
      # populated store survives even if the build or test steps fail.
      - name: Save dependency cache
        uses: actions/cache/save@v5
        with:
          path: ${{ steps.cabal-store-path.outputs.path }}
          key: ${{ steps.cache.outputs.cache-primary-key }}

      - name: Build
        run: cabal build --enable-tests

      - name: Test
        if: inputs.test == true
        run: cabal test --enable-tests --test-show-details=direct -j1

      - name: Install binary
        run: cabal install pgenie:pgn --installdir=bin --install-method=copy

      - name: Validate binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: ./bin/pgn.exe --version

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x bin/pgn
          mv bin/pgn "bin/${{ inputs.artifact-name }}"
          tar -czf "bin/${{ inputs.artifact-name }}.tar.gz" -C bin "${{ inputs.artifact-name }}"

      # Verify the macOS binary targets the expected minimum OS version.
      # The MACOSX_DEPLOYMENT_TARGET step above sets minos=12.0; if that step
      # is ever accidentally removed, this check will catch it before release.
      - name: Validate macOS minimum version (minos=12.0)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          minos=$(otool -l "bin/${{ inputs.artifact-name }}" \
            | awk '/LC_BUILD_VERSION/{f=1} f && /minos/{print $2; f=0}')
          echo "Binary minos: $minos"
          if [[ "$minos" != "12.0" ]]; then
            echo "::error::Expected minos 12.0 but got $minos."
            echo "::error::Ensure MACOSX_DEPLOYMENT_TARGET=12.0 is exported"
            echo "::error::before cabal build (see 'Set macOS deployment target' step)."
            exit 1
          fi

      # Verify the macOS binary does NOT dynamically link libpq, libssl, or
      # libcrypto.  Those must be statically embedded via the -force_load
      # flags above.  If they appear here it means the linker fell back to a
      # dynamic version (e.g. from a Homebrew installation), which would
      # cause two OpenSSL instances in one process → SIGSEGV at first SQL.
      - name: Validate macOS static linking (no dynamic libpq/ssl/crypto)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "Dynamic library dependencies:"
          otool -L "bin/${{ inputs.artifact-name }}"
          if otool -L "bin/${{ inputs.artifact-name }}" | grep -qE 'libpq|libssl|libcrypto'; then
            echo "::error::Binary unexpectedly links libpq/libssl/libcrypto dynamically."
            echo "::error::Ensure 'Set up PostgreSQL' is not installing a competing system libpq"
            echo "::error::and that -Wl,-force_load flags are used for the static archives."
            exit 1
          fi
          echo "OK: libpq/libssl/libcrypto are statically embedded."

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: mv bin/pgn.exe "bin/${{ inputs.artifact-name }}"

      - name: Upload binary artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: bin/${{ inputs.artifact-name }}.tar.gz

      - name: Upload binary artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: bin/${{ inputs.artifact-name }}

      - name: Build source distribution and capture path
        if: runner.os == 'Linux'
        id: sdist
        shell: bash
        run: |
          set -euo pipefail

          # Run cabal sdist and capture its output
          cabal sdist 2>&1 | tee sdist-output.txt

          # Extract the line after the 'Wrote tarball sdist to' message
          FILE=$(awk '/Wrote tarball sdist to/{getline; print; exit}' sdist-output.txt || true)
          if [[ -z "$FILE" ]]; then
            echo "ERROR: sdist path not found in cabal output" >&2
            echo "sdist_path=" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "sdist_path=$FILE" >> $GITHUB_OUTPUT

      - name: Upload source distribution
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: source-distribution
          path: ${{ steps.sdist.outputs.sdist_path }}

  # Download the uploaded artifact on a fresh runner and run the full
  # artifact-generation workflow against the demo project.  This simulates
  # what a real user does after downloading the binary from a GitHub release:
  # the runner starts in a clean state without any of the build dependencies
  # cached, so this validates that the artifact is truly self-contained and
  # does not rely on any undeclared dependencies that happened to be present
  # in the build environment.
  validate-artifact:
    needs: build
    runs-on: ${{ inputs.os }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4.1.3
        with:
          name: ${{ inputs.artifact-name }}
          path: artifact

      - name: Extract binary
        shell: bash
        run: |
          cd artifact
          tar -xzf "${{ inputs.artifact-name }}.tar.gz"
          ls -la

      - name: Run basic check on the binary
        run: |
          "$GITHUB_WORKSPACE/artifact/${{ inputs.artifact-name }}" --version

      - name: Checkout demo project
        if: inputs.e2e == true
        uses: actions/checkout@v6
        with:
          repository: pgenie-io/demo
          ref: 3fd8694f8f77c46e99c5b2d16a88f63b0d6aa21b
          path: demo

      - name: Set up Docker
        if: inputs.e2e == true && runner.os == 'macOS'
        uses: docker/setup-docker-action@v5

      - name: Run end-to-end test
        if: inputs.e2e == true
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE/demo"
          "$GITHUB_WORKSPACE/artifact/${{ inputs.artifact-name }}" generate
