name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version in SemVer format (e.g. 1.2.3)
        required: true
        type: string
      fast:
        description: Skip some long-running tests for hotfix releases
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      version:
        description: Release version in SemVer format (e.g. 1.2.3)
        required: true
        type: string
      fast:
        description: Skip some long-running tests for hotfix releases
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    steps:
      - name: Validate SemVer format
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version '${{ inputs.version }}' is not valid SemVer (expected X.Y.Z)."
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Check changelog release header
        shell: bash
        run: |
          expected_heading="# v${{ inputs.version }}"
          top_heading="$(head -n 1 CHANGELOG.md)"

          if [[ "$top_heading" != '# Upcoming' && "$top_heading" != "$expected_heading" ]]; then
            echo "::error::CHANGELOG.md must start with either '# Upcoming' or '$expected_heading' before releasing."
            exit 1
          fi

      - name: Check tag does not already exist
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ inputs.version }}" | grep -q .; then
            echo "::error::Tag v${{ inputs.version }} already exists. Choose a different version."
            exit 1
          fi

  build-linux-x64:
    name: Build and test (Linux-x64)
    needs: validate
    uses: ./.github/workflows/build-linux-x64.yaml
    secrets: inherit
    with:
      version: ${{ inputs.version }}

  build-linux-arm64:
    name: Build and test (Linux-arm64)
    needs: validate
    uses: ./.github/workflows/build-linux-arm64.yaml
    secrets: inherit
    with:
      version: ${{ inputs.version }}

  build-macos-arm64:
    name: Build and test (macOS-arm64)
    needs: validate
    uses: ./.github/workflows/build-macos-arm64.yaml
    secrets: inherit
    with:
      version: ${{ inputs.version }}

  build-macos-x64:
    name: Build and test (macOS-x64)
    needs: validate
    uses: ./.github/workflows/build-macos-x64.yaml
    secrets: inherit
    with:
      version: ${{ inputs.version }}
      fast: ${{ inputs.fast }}

  build-windows-x64:
    name: Build and test (Windows-x64)
    needs: validate
    uses: ./.github/workflows/build-windows-x64.yaml
    secrets: inherit
    with:
      version: ${{ inputs.version }}

  # ── Publish ──────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub release
    needs: [build-linux-x64, build-linux-arm64, build-macos-arm64, build-macos-x64, build-windows-x64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: artifacts

      - name: Prepare changelog for release
        id: prepare
        shell: bash
        run: |
          set -euo pipefail

          expected_heading="# v${{ inputs.version }}"
          top_heading="$(head -n 1 CHANGELOG.md)"
          needs_commit=false

          if [[ "$top_heading" == '# Upcoming' ]]; then
            perl -0pi -e 's/^# Upcoming$/# v${{ inputs.version }}/m' CHANGELOG.md
            needs_commit=true
          elif [[ "$top_heading" != "$expected_heading" ]]; then
            echo "::error::CHANGELOG.md must start with either '# Upcoming' or '$expected_heading' before releasing."
            exit 1
          fi

          if [[ "$needs_commit" == true ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md
            git commit -m "Prepare v${{ inputs.version }} release"
            git push origin HEAD:"${{ github.ref }}"
          fi

          echo "commit-sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create release and upload artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --target "${{ steps.prepare.outputs.commit-sha }}" \
            artifacts/*

  # ── Post-release ─────────────────────────────────────────────────────────────
  update-homebrew-tap:
    name: Update Homebrew tap formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger update-pgn-formula workflow on homebrew tap repo
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.LANDING_PAT }}
        run: |
          set -euo pipefail

          if ! gh workflow run update-pgn-formula.yml \
            --repo pgenie-io/homebrew-tap \
            --ref main \
            --field release_tag="v${{ inputs.version }}"; then
            echo "::warning::Failed to trigger pgenie-io/homebrew-tap/update-pgn-formula.yml for v${{ inputs.version }}."
          fi
