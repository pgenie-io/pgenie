name: Build and Test (Windows)

on:
  workflow_call:
    inputs:
      artifact-name:
        description: Name for the uploaded binary artifact (e.g. pgn-windows-x86_64)
        type: string
        required: true
      version:
        description: >
          Release version in SemVer (e.g. 1.2.3). When provided the version in
          cabal-file is updated to 0.<version> before building to follow PVP
          convention.
        type: string
        required: false
        default: ""
      test:
        description: Run integration tests that require Docker/Postgres
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Windows deps
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: |
            pkg-config
            zlib

      - name: Build and test
        uses: ./.github/actions/build-and-test
        with:
          version: ${{ inputs.version }}
          artifact-name: ${{ inputs.artifact-name }}
          test: ${{ inputs.test }}

      - name: Validate binary
        shell: bash
        run: ./bin/pgn.exe --version

      - name: Rename binary
        shell: bash
        run: mv bin/pgn.exe "bin/${{ inputs.artifact-name }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: bin/${{ inputs.artifact-name }}

  # Download the uploaded artifact on a fresh runner and verify that it runs.
  # This validates that the artifact is truly self-contained and does not rely
  # on any undeclared dependencies that happened to be present in the build
  # environment.
  validate-artifact:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4.1.3
        with:
          name: ${{ inputs.artifact-name }}
          path: artifact

      - name: Run basic check on the binary
        shell: bash
        run: |
          "$GITHUB_WORKSPACE/artifact/${{ inputs.artifact-name }}" --version
