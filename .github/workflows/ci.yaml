name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# Cancel superseded runs for the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-formatting:
    uses: ./.github/workflows/check-formatting.yaml
    secrets: inherit

  build-linux:
    uses: ./.github/workflows/build-linux.yaml
    secrets: inherit

  build-macos-arm64:
    name: Build and test on macOS-arm64
    uses: ./.github/workflows/build-macos-arm64.yaml
    secrets: inherit

  build-macos-x64:
    name: Build and test on macOS-x64
    uses: ./.github/workflows/build-macos-x64.yaml
    secrets: inherit

  sdist:
    name: Build sdist
    uses: ./.github/workflows/sdist.yaml
    secrets: inherit

  e2e:
    name: End-to-end tests
    uses: ./.github/workflows/e2e.yaml
    secrets: inherit

  build-stack:
    name: Build and test via Stack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: haskell-actions/setup@v2
        with:
          enable-stack: true
          stack-no-global: true

      - name: Cache Stack dependencies
        uses: actions/cache@v5
        with:
          path: ~/.stack
          key: ${{ runner.os }}-stack-${{ hashFiles('stack.yaml') }}
          restore-keys: |
            ${{ runner.os }}-stack-

      - name: Run tests via Stack
        run: stack test
