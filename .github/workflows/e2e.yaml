name: E2E Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  # ── Build the binary once and share it with the test jobs ─────────────────
  build:
    runs-on: ubuntu-latest

    outputs:
      artifact-name: ${{ env.artifact-name }}

    env:
      artifact-name: pgn-e2e-linux-x64

    steps:
      - uses: actions/checkout@v6

      - name: Install libpq
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Build
        id: build
        uses: ./.github/actions/build

      - name: Package binary
        run: |
          dir="$(dirname "${{ steps.build.outputs.binary-path }}")"
          file="$(basename "${{ steps.build.outputs.binary-path }}")"
          tar -czf "${{ env.artifact-name }}.tar.gz" -C "$dir" "$file"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.artifact-name }}
          path: ${{ env.artifact-name }}.tar.gz

  # ── Docker mode – analyse, generate, manage-indexes ───────────────────────
  docker-mode:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install libpq
        run: sudo apt-get update && sudo apt-get install -y libpq5

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: artifact

      - name: Extract binary
        run: |
          tar -xzf "artifact/${{ needs.build.outputs.artifact-name }}.tar.gz" -C artifact
          chmod +x artifact/pgn

      - name: Set up test project
        run: cp -r .github/e2e e2e-project

      - name: analyse – docker mode
        working-directory: e2e-project
        run: $GITHUB_WORKSPACE/artifact/pgn analyse

      - name: generate – docker mode
        working-directory: e2e-project
        run: $GITHUB_WORKSPACE/artifact/pgn generate

      - name: manage-indexes – docker mode (output only)
        working-directory: e2e-project
        run: $GITHUB_WORKSPACE/artifact/pgn manage-indexes

      - name: manage-indexes – docker mode (add migration)
        working-directory: e2e-project
        run: |
          $GITHUB_WORKSPACE/artifact/pgn manage-indexes --add-migration
          # Verify the migration file was created
          ls migrations/ | grep -E '^[0-9]+\.sql$'

  # ── Running-server mode – analyse, generate, manage-indexes ───────────────
  running-server-mode:
    needs: build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: "host=localhost port=5432 user=postgres password=postgres"

    steps:
      - uses: actions/checkout@v6

      - name: Install libpq
        run: sudo apt-get update && sudo apt-get install -y libpq5

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: artifact

      - name: Extract binary
        run: |
          tar -xzf "artifact/${{ needs.build.outputs.artifact-name }}.tar.gz" -C artifact
          chmod +x artifact/pgn

      - name: Set up test project
        run: cp -r .github/e2e e2e-project

      - name: analyse – running-server mode
        working-directory: e2e-project
        run: $GITHUB_WORKSPACE/artifact/pgn --database-url "$DATABASE_URL" analyse

      - name: generate – running-server mode
        working-directory: e2e-project
        run: $GITHUB_WORKSPACE/artifact/pgn --database-url "$DATABASE_URL" generate

      - name: manage-indexes – running-server mode (output only)
        working-directory: e2e-project
        run: $GITHUB_WORKSPACE/artifact/pgn --database-url "$DATABASE_URL" manage-indexes

      - name: manage-indexes – running-server mode (add migration)
        working-directory: e2e-project
        run: |
          $GITHUB_WORKSPACE/artifact/pgn --database-url "$DATABASE_URL" manage-indexes --add-migration
          # Verify the migration file was created
          ls migrations/ | grep -E '^[0-9]+\.sql$'
