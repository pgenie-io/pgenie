name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version in SemVer format (e.g. 1.2.3)"
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: "Release version in SemVer format (e.g. 1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    steps:
      - name: Validate SemVer format
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version '${{ inputs.version }}' is not valid SemVer (expected X.Y.Z)."
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check changelog has upcoming section
        shell: bash
        run: |
          if ! head -n 1 CHANGELOG.md | grep -qx '# Upcoming'; then
            echo "::error::CHANGELOG.md must start with '# Upcoming' before releasing."
            exit 1
          fi

      - name: Check tag does not already exist
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ inputs.version }}" | grep -q .; then
            echo "::error::Tag v${{ inputs.version }} already exists. Choose a different version."
            exit 1
          fi

  prepare-release:
    name: Prepare release commit
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      commit-sha: ${{ steps.commit.outputs.commit-sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Update changelog for release
        shell: bash
        run: |
          perl -0pi -e 's/^# Upcoming$/# v${{ inputs.version }}/m' CHANGELOG.md

          if ! head -n 1 CHANGELOG.md | grep -qx '# v${{ inputs.version }}'; then
            echo "::error::Failed to update CHANGELOG.md for v${{ inputs.version }}."
            exit 1
          fi

      - name: Commit and push release changelog
        id: commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "Prepare v${{ inputs.version }} release"
          git push origin HEAD:"${{ github.ref }}"
          echo "commit-sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build-linux:
    name: Build and test (Linux-x64)
    needs: prepare-release
    uses: ./.github/workflows/build-linux.yaml
    secrets: inherit
    with:
      version: ${{ inputs.version }}
      ref: ${{ needs.prepare-release.outputs.commit-sha }}

  build-macos-arm64:
    name: Build and test (macOS-arm64)
    needs: prepare-release
    uses: ./.github/workflows/build-macos-arm64.yaml
    secrets: inherit
    with:
      version: ${{ inputs.version }}
      ref: ${{ needs.prepare-release.outputs.commit-sha }}

  build-macos-x64:
    name: Build and test (macOS-x64)
    needs: prepare-release
    uses: ./.github/workflows/build-macos-x64.yaml
    secrets: inherit
    with:
      version: ${{ inputs.version }}
      ref: ${{ needs.prepare-release.outputs.commit-sha }}

  sdist:
    name: Build sdist
    needs: prepare-release
    uses: ./.github/workflows/sdist.yaml
    secrets: inherit
    with:
      version: ${{ inputs.version }}
      ref: ${{ needs.prepare-release.outputs.commit-sha }}

  # ── Publish ──────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub release
    needs: [prepare-release, build-linux, build-macos-arm64, build-macos-x64, sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.commit-sha }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: artifacts

      - name: Create release and upload artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --target "${{ needs.prepare-release.outputs.commit-sha }}" \
            artifacts/*

  # ── Post-release ─────────────────────────────────────────────────────────────
  update-homebrew-tap:
    name: Update Homebrew tap formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger update-pgn-formula workflow on homebrew tap repo
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.LANDING_PAT }}
        run: |
          set -euo pipefail

          if ! gh workflow run update-pgn-formula.yml \
            --repo pgenie-io/homebrew-tap \
            --ref main \
            --field release_tag="v${{ inputs.version }}"; then
            echo "::warning::Failed to trigger pgenie-io/homebrew-tap/update-pgn-formula.yml for v${{ inputs.version }}."
          fi
