name: Build (macOS-x64)

on:
  workflow_call:
    inputs:
      version:
        description: >
          Release version in SemVer (e.g. 1.2.3). When provided the version in
          cabal-file is updated to 0.<version> before building to follow PVP
          convention.
        type: string
        required: false
        default: ""
      ref:
        description: Commit SHA or ref to checkout for the build.
        type: string
        required: false
        default: ""
      fast:
        description: Skip e2e tests for hotfix releases.
        type: boolean
        required: false
        default: false

permissions:
  contents: read

env:
  artifact-name: pgn-macos-x64

jobs:
  build:
    runs-on: macos-15-intel

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      # testcontainers-postgresql (used by infra-test) needs a Docker daemon.
      # macOS runners need explicit setup.
      - name: Set up Docker
        uses: docker/setup-docker-action@v5

      - name: Install libpq
        run: brew install libpq

      # libpq from Homebrew is keg-only and not in the default search paths,
      # so we tell cabal and postgresql-libpq where to find the headers and
      # library.  We also embed the Homebrew rpath into the pgenie executable
      # so that the distributed binary finds libpq without extra environment
      # variables – Homebrew distributions declare libpq as a dependency and
      # install it at this standard location.
      - name: Configure cabal for Homebrew libpq
        shell: bash
        run: |
          # libpq is keg-only; make pg_config and pkg-config metadata visible
          # to the postgresql-libpq build (it uses autoconf to find PostgreSQL).
          echo "/usr/local/opt/libpq/bin" >> $GITHUB_PATH
          echo "PKG_CONFIG_PATH=/usr/local/opt/libpq/lib/pkgconfig" >> $GITHUB_ENV

          cat >> cabal.project.local << 'EOF'
          package postgresql-libpq
            extra-include-dirs: /usr/local/opt/libpq/include
            extra-lib-dirs: /usr/local/opt/libpq/lib
          package pgenie
            extra-lib-dirs: /usr/local/opt/libpq/lib
            ghc-options: -optl-Wl,-rpath,/usr/local/opt/libpq/lib
          EOF

      - name: Build and test
        id: build
        uses: ./.github/actions/build
        with:
          version: ${{ inputs.version }}
          test-integration: true

      - name: Package
        shell: bash
        run: |
          dir="$(dirname "${{ steps.build.outputs.binary-path }}")"
          file="$(basename "${{ steps.build.outputs.binary-path }}")"
          tar -czf "${{ env.artifact-name }}.tar.gz" -C "$dir" "$file"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.artifact-name }}
          path: ${{ env.artifact-name }}.tar.gz

  e2e-sanity-check:
    needs: build
    runs-on: macos-15-intel

    steps:
      - name: Install libpq
        run: brew install libpq

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.artifact-name }}
          path: artifact

      - name: Extract binary
        shell: bash
        run: |
          tar -xzf "artifact/${{ env.artifact-name }}.tar.gz" -C artifact
          chmod +x artifact/pgn

      - name: Verify binary version
        run: artifact/pgn --version

  e2e-docker-mode:
    needs: build
    if: inputs.fast != true
    runs-on: macos-15-intel

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker
        uses: docker/setup-docker-action@v5

      - name: Install libpq
        run: brew install libpq

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.artifact-name }}
          path: artifact

      - name: Extract binary
        id: extract
        shell: bash
        run: |
          tar -xzf "artifact/${{ env.artifact-name }}.tar.gz" -C artifact
          chmod +x artifact/pgn
          echo "bin=$GITHUB_WORKSPACE/artifact/pgn" >> "$GITHUB_OUTPUT"

      - name: Set up test project
        shell: bash
        run: cp -r .github/e2e e2e-project

      - uses: ./.github/actions/e2e-docker
        with:
          exe: ${{ steps.extract.outputs.bin }}

  e2e-running-server-mode:
    needs: build
    runs-on: macos-15-intel

    env:
      DATABASE_URL: "host=localhost port=5432 user=postgres"

    steps:
      - uses: actions/checkout@v6

      - name: Install libpq
        run: brew install libpq

      - name: Install and start PostgreSQL
        run: |
          brew install postgresql@17
          PG_BIN="/usr/local/opt/postgresql@17/bin"
          "$PG_BIN/initdb" -D ~/pgdata --auth=trust --username=postgres
          "$PG_BIN/pg_ctl" start -D ~/pgdata -l ~/pgdata/postgresql.log
          until "$PG_BIN/pg_isready" -h localhost -U postgres; do sleep 1; done
          echo "$PG_BIN" >> $GITHUB_PATH

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.artifact-name }}
          path: artifact

      - name: Extract binary
        id: extract
        shell: bash
        run: |
          tar -xzf "artifact/${{ env.artifact-name }}.tar.gz" -C artifact
          chmod +x artifact/pgn
          echo "bin=$GITHUB_WORKSPACE/artifact/pgn" >> "$GITHUB_OUTPUT"

      - name: Set up test project
        shell: bash
        run: cp -r .github/e2e e2e-project

      - uses: ./.github/actions/e2e-live-postgres
        with:
          exe: ${{ steps.extract.outputs.bin }}
          database-url: ${{ env.DATABASE_URL }}
