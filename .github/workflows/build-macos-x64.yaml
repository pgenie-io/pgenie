name: Build (macOS-x64)

on:
  workflow_call:
    inputs:
      version:
        description: >
          Release version in SemVer (e.g. 1.2.3). When provided the version in
          cabal-file is updated to 0.<version> before building to follow PVP
          convention.
        type: string
        required: false
        default: ""

permissions:
  contents: read

env:
  artifact-name: pgn-macos-x64

jobs:
  build:
    runs-on: macos-15-intel

    steps:
      - uses: actions/checkout@v6

      # testcontainers-postgresql (used by infra-test) needs a Docker daemon.
      # macOS runners need explicit setup.
      - name: Set up Docker
        uses: docker/setup-docker-action@v5

      - name: Set up PostgreSQL
        uses: ikalnytskyi/action-setup-postgres@v8

      - name: Install libpq
        run: brew install libpq

      # libpq from Homebrew is keg-only and not in the default search paths,
      # so we tell cabal and postgresql-libpq where to find the headers and
      # library.  We also embed the Homebrew rpath into the pgenie executable
      # so that the distributed binary finds libpq without extra environment
      # variables – Homebrew distributions declare libpq as a dependency and
      # install it at this standard location.
      - name: Configure cabal for Homebrew libpq
        shell: bash
        run: |
          cat >> cabal.project.local << 'EOF'
          package postgresql-libpq
            extra-include-dirs: /usr/local/opt/libpq/include
            extra-lib-dirs: /usr/local/opt/libpq/lib
          package pgenie
            extra-lib-dirs: /usr/local/opt/libpq/lib
            ghc-options: -optl-Wl,-rpath,/usr/local/opt/libpq/lib
          EOF

      - name: Build and test
        id: build
        uses: ./.github/actions/build
        with:
          version: ${{ inputs.version }}
          test-integration: true

      - name: Package
        shell: bash
        run: |
          dir="$(dirname "${{ steps.build.outputs.binary-path }}")"
          file="$(basename "${{ steps.build.outputs.binary-path }}")"
          tar -czf "${{ env.artifact-name }}.tar.gz" -C "$dir" "$file"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.artifact-name }}
          path: ${{ env.artifact-name }}.tar.gz

  validate-artifact:
    needs: build
    runs-on: macos-15-intel

    steps:
      - name: Install libpq
        run: brew install libpq

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.artifact-name }}
          path: artifact

      - name: Extract binary
        shell: bash
        run: |
          cd artifact
          tar -xzf "${{ env.artifact-name }}.tar.gz"
          ls -la

      - name: Run basic check on the binary
        run: |
          "$GITHUB_WORKSPACE/artifact/pgn" --version

      - name: Checkout demo project
        uses: actions/checkout@v6
        with:
          repository: pgenie-io/demo
          ref: 3fd8694f8f77c46e99c5b2d16a88f63b0d6aa21b
          path: demo

      - name: Set up Docker
        uses: docker/setup-docker-action@v5

      - name: Run end-to-end test
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE/demo"
          "$GITHUB_WORKSPACE/artifact/pgn" generate
