name: Build and Test

on:
  workflow_call:
    inputs:
      os:
        description: Runner operating system (e.g. ubuntu-latest, macos-latest, windows-latest)
        type: string
        required: true
      artifact-name:
        description: Name for the uploaded binary artifact (e.g. pgn-linux-x86_64)
        type: string
        required: true
      version:
        description: >
          Release version in SemVer (e.g. 1.2.3). When provided the version in cabal-file is
          updated to 0.<version> before building to follow PVP convention.
        type: string
        required: false
        default: ""
      test:
        description: Run integration tests that require Docker/Postgres
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ inputs.os }}

    steps:
      - uses: actions/checkout@v6

      - name: GitHub Actions runner OS system information
        uses: kenchan0130/actions-system-info@v1.4.0
        id: system-info

      - name: Update version in cabal file
        if: inputs.version != ''
        shell: bash
        run: perl -i -pe 's/^version:\s*\K\S+/0.${{ inputs.version }}/' pgenie.cabal

      # testcontainers-postgresql (used by infra-test) needs a Docker daemon.
      # Linux runners already include one; macOS and Windows need explicit setup.
      - name: Set up Docker
        if: inputs.test == true && runner.os == 'macOS'
        uses: docker/setup-docker-action@v5

      - name: Set up PostgreSQL
        if: runner.os == 'macOS'
        uses: ikalnytskyi/action-setup-postgres@v8

      # Link libpq (and its OpenSSL dependencies) statically so that the
      # produced binary does not hard-code a Homebrew-specific dylib path and
      # therefore runs on any macOS system without a PostgreSQL installation.
      - name: Configure static libpq linking (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          # Install the standalone PostgreSQL client library.  The full server
          # installed by action-setup-postgres does not ship libpq.a in newer
          # Homebrew formula versions (PostgreSQL 17+ dropped the static
          # archive), so we install the dedicated client-only formula which
          # always provides a static archive.
          brew install libpq

          LIBPQ_PREFIX=$(brew --prefix libpq)
          OPENSSL_PREFIX=$(brew --prefix openssl@3)

          LIBPQ_A="$LIBPQ_PREFIX/lib/libpq.a"
          LIBSSL_A="$OPENSSL_PREFIX/lib/libssl.a"
          LIBCRYPTO_A="$OPENSSL_PREFIX/lib/libcrypto.a"

          echo "libpq.a:     $LIBPQ_A"
          echo "libssl.a:    $LIBSSL_A"
          echo "libcrypto.a: $LIBCRYPTO_A"

          for f in "$LIBPQ_A" "$LIBSSL_A" "$LIBCRYPTO_A"; do
            [ -f "$f" ] || { echo "ERROR: $f not found"; exit 1; }
          done

          # Homebrew's libpq is compiled with GSSAPI support using MIT Kerberos
          # (krb5).  We must also link those libraries statically to prevent the
          # produced binary from depending on Homebrew's libgssapi_krb5.dylib,
          # which is absent on clean macOS installations.
          brew install krb5

          KRB5_PREFIX=$(brew --prefix krb5)

          # Build a static-only directory (no .dylib files) so the macOS
          # linker resolves every -l flag from .a files before it can find a
          # Homebrew .dylib in the paths that postgresql-libpq injects via
          # pg_config.
          mkdir -p /tmp/static-libs
          cp "$LIBPQ_A" /tmp/static-libs/

          # Collect MIT Kerberos static archives into the static-only directory
          # and accumulate the corresponding -optl flags in dependency order
          # (consumers before providers: gssapi → krb5 → k5crypto → support).
          KRB5_STATIC_OPTL=""
          for krb5_lib in \
            "$KRB5_PREFIX/lib/libgssapi_krb5.a" \
            "$KRB5_PREFIX/lib/libkrb5.a" \
            "$KRB5_PREFIX/lib/libk5crypto.a" \
            "$KRB5_PREFIX/lib/libkrb5support.a" \
            "$KRB5_PREFIX/lib/libcom_err.a"; do
            if [ -f "$krb5_lib" ]; then
              cp "$krb5_lib" /tmp/static-libs/
              KRB5_STATIC_OPTL="$KRB5_STATIC_OPTL -optl$krb5_lib"
              echo "Copied $(basename "$krb5_lib")"
            else
              echo "WARNING: $krb5_lib not found"
            fi
          done
          ls -la /tmp/static-libs/

          # Configure cabal:
          # - postgresql-libpq: point to the keg-only libpq headers so the C
          #   binding compiles against the correct API; add /tmp/static-libs so
          #   that the -lpq flag this package contributes resolves to libpq.a.
          # - pgenie (final executable): also add /tmp/static-libs for -lpq,
          #   then pass all static archives directly to the linker via -optl so
          #   that the macOS linker cannot silently prefer a Homebrew .dylib when
          #   processing the extra -L paths from pg_config.  Kerberos archives
          #   come before OpenSSL because they depend on it.
          cat >> cabal.project.local << EOF
          package postgresql-libpq
            extra-include-dirs: $LIBPQ_PREFIX/include
            extra-lib-dirs: /tmp/static-libs
          package pgenie
            extra-lib-dirs: /tmp/static-libs
            ghc-options:$KRB5_STATIC_OPTL -optl$LIBSSL_A -optl$LIBCRYPTO_A
          EOF

      - name: Install Windows deps
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: |
            pkg-config
            zlib

      - name: Set up GHC
        id: setup
        uses: haskell-actions/setup@v2
        with:
          ghc-version: 9.12.2
          cabal-version: latest

      # On Windows, haskell-actions/setup outputs C:\sr as the cabal-store
      # path, which is a junction (reparse-point) to the real store directory.
      # actions/cache does not traverse junctions, so it only captures the
      # tiny junction metadata instead of the actual package contents.
      # We resolve the junction to the real target path here so that the
      # cache steps below operate on the actual directory.
      - name: Resolve cabal store path
        id: cabal-store-path
        shell: bash
        run: |
          dir="${{ steps.setup.outputs.cabal-store }}"
          if [[ "${{ runner.os }}" == "Windows" ]]
          then
            real=$(powershell.exe -NoProfile -Command "(Get-Item '$dir').Target" 2>/dev/null || true)
            if [[ -n "$real" ]]
            then
              dir="$real"
            fi
          fi
          echo "path=$dir" >> $GITHUB_OUTPUT

      # Restore the package-store cache so that dependency compilation is
      # skipped when unchanged.  The cache is split from the full build so
      # that it is always saved even when later steps (tests) fail.
      - name: Restore dependency cache
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ steps.cabal-store-path.outputs.path }}
          key: ${{ runner.os }}-${{ steps.system-info.outputs.release }}-ghc-${{ steps.setup.outputs.ghc-version }}-${{ hashFiles('**/*.cabal', 'cabal.project*') }}
          restore-keys: |
            ${{ runner.os }}-${{ steps.system-info.outputs.release }}-ghc-${{ steps.setup.outputs.ghc-version }}-

      - name: Update Cabal package list
        run: cabal update

      - name: Build dependencies
        run: cabal build all --only-dependencies --enable-tests

      # Save the cache immediately after dependencies are built so that the
      # populated store survives even if the build or test steps fail.
      - name: Save dependency cache
        uses: actions/cache/save@v5
        with:
          path: ${{ steps.cabal-store-path.outputs.path }}
          key: ${{ steps.cache.outputs.cache-primary-key }}

      - name: Build
        run: cabal build all --enable-tests

      - name: Test
        if: inputs.test == true
        run: cabal test all --enable-tests --test-show-details=direct

      - name: Install binary
        run: cabal install pgenie:pgn --installdir=bin --install-method=copy

      # Smoke-test the freshly built binary before packaging it.  This catches
      # linker issues (e.g. missing dylibs on macOS) that would otherwise only
      # surface after the artifact has been downloaded by end-users.
      - name: Validate binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ./bin/pgn --version
          # On macOS, additionally verify the binary has no dependencies on
          # non-system (Homebrew) dynamic libraries that would be absent on a
          # clean macOS installation.  This check fails with the current binary
          # and passes once static linking is correct, giving us an early
          # signal before the artifact is even uploaded.
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            echo "=== Dynamic library dependencies ==="
            otool -L bin/pgn
            non_system=$(otool -L bin/pgn | tail -n +2 | awk '{print $1}' | \
              grep -vE '^(/usr/lib/|/System/Library/|@)' || true)
            if [[ -n "$non_system" ]]; then
              echo "::error::Binary has non-system dynamic library dependencies:"
              echo "$non_system"
              exit 1
            fi
            echo "Binary only depends on system libraries ✓"
          fi

      - name: Validate binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: ./bin/pgn.exe --version

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x bin/pgn
          mv bin/pgn "bin/${{ inputs.artifact-name }}"
          tar -czf "bin/${{ inputs.artifact-name }}.tar.gz" -C bin "${{ inputs.artifact-name }}"

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: mv bin/pgn.exe "bin/${{ inputs.artifact-name }}"

      - name: Upload binary artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: bin/${{ inputs.artifact-name }}.tar.gz

      - name: Upload binary artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: bin/${{ inputs.artifact-name }}

      - name: Build source distribution
        if: runner.os == 'Linux'
        run: cabal sdist

  # Download the uploaded artifact on a fresh runner and execute it.  This
  # simulates what a user does after downloading the binary from a GitHub
  # release: the runner starts without the Homebrew packages that were
  # installed in the build job, so any accidental dynamic dependency on a
  # Homebrew library (e.g. libgssapi_krb5.dylib) is exposed here.
  validate-artifact:
    needs: build
    if: contains(inputs.os, 'macos')
    runs-on: ${{ inputs.os }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: artifact

      - name: Extract binary
        shell: bash
        run: |
          cd artifact
          tar -xzf "${{ inputs.artifact-name }}.tar.gz"
          ls -la

      - name: Remove quarantine attribute (macOS security)
        shell: bash
        run: |
          # macOS quarantines files downloaded via a browser or curl; remove the
          # extended attribute so Gatekeeper does not block execution.  In CI
          # the attribute is typically absent, but this mirrors what end-users
          # must do after downloading the binary from a GitHub release page.
          xattr -d com.apple.quarantine "artifact/${{ inputs.artifact-name }}" 2>/dev/null || true

      - name: Validate downloaded binary
        shell: bash
        run: |
          chmod +x "artifact/${{ inputs.artifact-name }}"
          "artifact/${{ inputs.artifact-name }}" --version
