name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version in SemVer format (e.g. 1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ── Pre-flight checks ────────────────────────────────────────────────────────
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    steps:
      - name: Validate SemVer format
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version '${{ inputs.version }}' is not valid SemVer (expected X.Y.Z)."
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check tag does not already exist
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ inputs.version }}" | grep -q .; then
            echo "::error::Tag v${{ inputs.version }} already exists. Choose a different version."
            exit 1
          fi

  # ── Platform builds ──────────────────────────────────────────────────────────
  # Each build job updates the cabal version to 0.<version> before compiling so
  # the released artifacts carry the correct version metadata.
  build-linux:
    name: Build and test (Linux / x86_64)
    needs: validate
    uses: ./.github/workflows/build-and-test.yaml
    secrets: inherit
    with:
      os: ubuntu-latest
      artifact-name: pgn-linux-x86_64
      version: ${{ inputs.version }}

  build-macos-arm64:
    name: Build and test (macOS / arm64)
    needs: validate
    uses: ./.github/workflows/build-and-test.yaml
    secrets: inherit
    with:
      os: macos-latest
      artifact-name: pgn-macos-arm64
      version: ${{ inputs.version }}

  build-macos-x86_64:
    name: Build and test (macOS / x86_64)
    needs: validate
    uses: ./.github/workflows/build-and-test.yaml
    secrets: inherit
    with:
      os: macos-26-intel
      artifact-name: pgn-macos-x86_64
      version: ${{ inputs.version }}

  build-windows:
    name: Build and test (Windows / x86_64)
    needs: validate
    uses: ./.github/workflows/build-and-test.yaml
    secrets: inherit
    with:
      os: windows-latest
      artifact-name: pgn-windows-x86_64.exe
      version: ${{ inputs.version }}

  # ── Publish ──────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub release
    needs: [build-linux, build-macos-arm64, build-macos-x86_64, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Create release and upload artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --target "${{ github.sha }}" \
            artifacts/*

  # ── Post-release ─────────────────────────────────────────────────────────────
  update-landing:
    name: Update landing download links
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger update-download-links workflow on landing repo
        env:
          GH_TOKEN: ${{ secrets.LANDING_PAT }}
        run: |
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version }}"
          gh workflow run update-download-links.yml \
            --repo pgenie-io/landing \
            --ref master \
            --field linux_x86_64_url="${BASE_URL}/pgn-linux-x86_64" \
            --field macos_arm64_url="${BASE_URL}/pgn-macos-arm64" \
            --field macos_x86_64_url="${BASE_URL}/pgn-macos-x86_64" \
            --field windows_x86_64_url="${BASE_URL}/pgn-windows-x86_64.exe"
