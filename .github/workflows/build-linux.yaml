name: Build and Test (Linux)

on:
  workflow_call:
    inputs:
      version:
        description: >
          Release version in SemVer (e.g. 1.2.3). When provided the version in
          cabal-file is updated to 0.<version> before building to follow PVP
          convention.
        type: string
        required: false
        default: ""
      ref:
        description: Commit SHA or ref to checkout for the build.
        type: string
        required: false
        default: ""

permissions:
  contents: read

env:
  artifact-name: pgn-linux-x64

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Install libpq
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Build
        id: build
        uses: ./.github/actions/build
        with:
          version: ${{ inputs.version }}
          test-integration: true

      - name: Package
        shell: bash
        run: |
          dir="$(dirname "${{ steps.build.outputs.binary-path }}")"
          file="$(basename "${{ steps.build.outputs.binary-path }}")"
          tar -czf "${{ env.artifact-name }}.tar.gz" -C "$dir" "$file"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.artifact-name }}
          path: ${{ env.artifact-name }}.tar.gz

  e2e-sanity-check:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Install libpq
        run: sudo apt-get update && sudo apt-get install -y libpq5

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.artifact-name }}
          path: artifact

      - name: Extract binary
        shell: bash
        run: |
          tar -xzf "artifact/${{ env.artifact-name }}.tar.gz" -C artifact
          chmod +x artifact/pgn

      - name: Verify binary version
        run: artifact/pgn --version

  e2e-docker-mode:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install libpq
        run: sudo apt-get update && sudo apt-get install -y libpq5

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.artifact-name }}
          path: artifact

      - name: Extract binary
        id: extract
        shell: bash
        run: |
          tar -xzf "artifact/${{ env.artifact-name }}.tar.gz" -C artifact
          chmod +x artifact/pgn
          echo "bin=$GITHUB_WORKSPACE/artifact/pgn" >> "$GITHUB_OUTPUT"

      - name: Set up test project
        shell: bash
        run: cp -r .github/e2e e2e-project

      - uses: ./.github/actions/e2e-docker
        with:
          exe: ${{ steps.extract.outputs.bin }}

  e2e-running-server-mode:
    needs: build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: "host=localhost port=5432 user=postgres password=postgres"

    steps:
      - uses: actions/checkout@v6

      - name: Install libpq
        run: sudo apt-get update && sudo apt-get install -y libpq5

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.artifact-name }}
          path: artifact

      - name: Extract binary
        id: extract
        shell: bash
        run: |
          tar -xzf "artifact/${{ env.artifact-name }}.tar.gz" -C artifact
          chmod +x artifact/pgn
          echo "bin=$GITHUB_WORKSPACE/artifact/pgn" >> "$GITHUB_OUTPUT"

      - name: Set up test project
        shell: bash
        run: cp -r .github/e2e e2e-project

      - uses: ./.github/actions/e2e-live-postgres
        with:
          exe: ${{ steps.extract.outputs.bin }}
          database-url: ${{ env.DATABASE_URL }}
